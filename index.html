<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Little Girl & Red Balloon</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Hijack scroll */
            background-color: #FAFAFA;
            font-family: sans-serif;
            touch-action: none;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: #333;
        }

        #scroll-msg {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #888;
            opacity: 1;
            transition: opacity 0.5s;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

    <div id="loading">Loading Assets...</div>
    <div id="scroll-msg">Scroll Down</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const loading = document.getElementById('loading');
        const scrollMsg = document.getElementById('scroll-msg');

        let width, height;
        let scale = 1;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            const dpr = window.devicePixelRatio || 1;

            // Physical pixels
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            // Logical pixels (CSS)
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';

            // Base viewport 800x600 for coordinate mapping
            scale = Math.min(width / 800, height / 600);
            if (scale > 1.5) scale = 1.5; // cap scaling on very large screens
        }
        window.addEventListener('resize', resize);
        resize();

        // Asset sources
        const girlSrcs = [
            '1-holding.svg',           // G1 (0)
            '2-reaching.svg',          // G2 (1)
            '3-start-chasing.svg',     // G3 (2)
            '4-running.svg',           // G4 (3)
            '5-running-harder.svg',    // G5 (4)
            '6-almost-there.svg',      // G6 (5)
            '7-grabbing-moment-new.svg',   // G7 (6)
            '8-flying-away-update.svg'        // G8 (7)
        ];

        const girlFrames = [];

        let assetsLoaded = 0;
        const totalAssets = girlSrcs.length;

        girlSrcs.forEach(src => {
            const img = new Image();
            img.src = src;
            img.onload = () => {
                assetsLoaded++;
                if (assetsLoaded === totalAssets) {
                    start();
                }
            };
            girlFrames.push(img);
        });

        // State Variables
        let scrollPercent = 0;
        let targetScrollPercent = 0;

        let girlY = 350;
        let targetGirlY = 350;
        let girlX = 0;
        let targetGirlX = 0;

        let girlFrameIndex = 0;

        let scrollVelocity = 0;
        let lastScrollTime = 0;
        let runTimer = 0;

        let state = 'STATE_IDLE';
        let grabPauseTimer = 0;

        // PRD Scroll mapping
        // Indexes: G1:0, G2:1, G3:2, G4:3, G5:4, G6:5, G7:6, G8:7
        const keyframes = [
            { p: 0, gIdx: 0, gy: 375, gx: -0.7 },
            { p: 10, gIdx: 1, gy: 375, gx: -0.7 },
            { p: 15, gIdx: 2, gy: 375, gx: -0.6 },
            { p: 20, gIdx: 3, gy: 375, gx: -0.5 },
            { p: 40, gIdx: 4, gy: 375, gx: -0.2 },
            { p: 60, gIdx: 3, gy: 375, gx: 0.2 },
            { p: 64.9, gIdx: 3, gy: 375, gx: 0.347 }, // Lock height until the very end of running phase
            { p: 65, gIdx: 5, gy: 325, gx: 0.35 }, // 6th frame
            { p: 70, gIdx: 6, gy: 207, gx: 0.5 },  // Grabbing
            { p: 73, gIdx: 7, gy: 136, gx: 0.6 },  // Flying
            { p: 100, gIdx: 7, gy: -500, gx: 1.5 } // Fly away top right
        ];

        function handleScroll(delta) {
            // If in grab pause, ignore scroll down slightly, but allow scroll up to escape
            if (grabPauseTimer > 0 && delta > 0) return;

            let prevTarget = targetScrollPercent;
            targetScrollPercent += delta;
            targetScrollPercent = Math.max(0, Math.min(100, targetScrollPercent));

            scrollVelocity = Math.abs(targetScrollPercent - prevTarget);
            lastScrollTime = performance.now();

            if (targetScrollPercent > prevTarget) state = 'STATE_RISE';
            else if (targetScrollPercent < prevTarget) state = 'STATE_FALL';

            // Trigger Grab Pause when hitting 70%
            if (prevTarget < 70 && targetScrollPercent >= 70 && targetScrollPercent < 75) {
                state = 'STATE_GRAB';
                grabPauseTimer = 200; // 0.2s pause
                targetScrollPercent = 70;
            }
        }

        // Event Listeners
        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            handleScroll(e.deltaY * 0.1);
        }, { passive: false });

        let touchStartY = 0;
        window.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('touchmove', e => {
            e.preventDefault();
            const dy = touchStartY - e.touches[0].clientY;
            touchStartY = e.touches[0].clientY;
            handleScroll(dy * 0.2);
        }, { passive: false });

        let lastTime = performance.now();

        function start() {
            loading.style.display = 'none';
            // Initialize position to first keyframe
            targetGirlX = -0.7 * (width / 2 / scale);
            girlX = targetGirlX;
            lastTime = performance.now();
            requestAnimationFrame(loop);
        }

        function update(dt) {
            if (grabPauseTimer > 0) {
                grabPauseTimer -= dt;
                if (grabPauseTimer <= 0) grabPauseTimer = 0;
            }

            if (performance.now() - lastScrollTime > 1000) {
                if (scrollPercent === 100) state = 'STATE_FLY';
                else state = 'STATE_IDLE';
            }

            // Smooth scroll
            scrollPercent += (targetScrollPercent - scrollPercent) * 0.1;

            // Update scroll indicators
            if (targetScrollPercent < 2) {
                scrollMsg.innerText = "Scroll Down";
                scrollMsg.style.opacity = 1;
            } else if (targetScrollPercent > 98) {
                scrollMsg.innerText = "Scroll Up";
                scrollMsg.style.opacity = 1;
            } else {
                scrollMsg.style.opacity = 0;
            }

            // Interpolate Keyframes
            let k1 = keyframes[0], k2 = keyframes[1];
            for (let i = 0; i < keyframes.length - 1; i++) {
                if (scrollPercent >= keyframes[i].p && scrollPercent <= keyframes[i + 1].p) {
                    k1 = keyframes[i];
                    k2 = keyframes[i + 1];
                    break;
                }
            }

            let t = 0;
            if (k2.p > k1.p) {
                t = (scrollPercent - k1.p) / (k2.p - k1.p);
            }

            targetGirlY = k1.gy + (k2.gy - k1.gy) * t;
            let targetGx = k1.gx + (k2.gx - k1.gx) * t;
            targetGirlX = targetGx * (width / 2 / scale);

            // Smoothly move towards targets
            girlY += (targetGirlY - girlY) * 0.08;
            girlX += (targetGirlX - girlX) * 0.08;

            // Frame selection
            let gIdx = k1.gIdx;

            // Dynamic Run Cycle (G4=3, G5=4)
            const isScrolling = performance.now() - lastScrollTime < 150;
            if (isScrolling && scrollPercent >= 20 && scrollPercent < 65) {
                let runSpeed = Math.max(60, Math.min(200, 250 - scrollVelocity * 10));
                runTimer += dt;
                if (runTimer > runSpeed) {
                    runTimer = 0;
                    girlFrameIndex = girlFrameIndex === 3 ? 4 : 3;
                }
            } else if (scrollPercent >= 65) {
                girlFrameIndex = k1.gIdx;
                if (scrollPercent >= 99) girlFrameIndex = 7;
            } else {
                girlFrameIndex = gIdx;
            }
        }

        function loop(time) {
            const dt = time - lastTime;
            lastTime = time;

            update(dt);
            draw();

            requestAnimationFrame(loop);
        }

        function draw() {
            // Clear using physical dimensions
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();

            // Scale for high-DPI displays
            const dpr = window.devicePixelRatio || 1;
            ctx.scale(dpr, dpr);

            ctx.translate(width / 2, 0); // Center X
            ctx.scale(scale, scale);

            // Calculate visual Y offsets (Canvas center is y=0 if we translated, but we didn't translate Y)
            // Adjust coordinate system: 800x600 canvas logic
            const offsetY = height / 2 / scale - 300; // Center vertically for 600 base

            const gImg = girlFrames[girlFrameIndex];

            let imgDrawWidth = 0;
            let imgDrawHeight = 0;
            let imgScale = 1;

            // Draw Girl
            if (gImg && gImg.height > 0) {
                // Make the image take 1/2 of the viewport height
                // In the transformed scale, the viewport height is (height / scale)
                const targetHeight = (height / 2) / scale;
                imgScale = targetHeight / gImg.height;

                imgDrawWidth = gImg.width * imgScale;
                imgDrawHeight = targetHeight;

                // Draw relative to girlX (centered horizontally on girlX)
                ctx.drawImage(gImg, girlX - imgDrawWidth / 2, girlY + offsetY - imgDrawHeight / 2, imgDrawWidth, imgDrawHeight);
            }

            ctx.restore();
        }
    </script>

</body>

</html>
